# rgam5terra RTX 5070 Wayland/resume baseline (nvidia-open-dkms).
# Validate with rgam5terra-thermal-check and suspend/resume cycles after reboot to linux-rg.
#
# Do NOT set NVreg_UsePageAttributeTable — not a valid parm on 610.x open modules
# (kernel logs: "nvidia: unknown parameter 'NVreg_UsePageAttributeTable' ignored").
# Align resume path with nvidia-utils (TemporaryFilePath + suspend notifiers live there).
options nvidia_drm modeset=1
options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_DynamicPowerManagement=0x02
blacklist nouveau
blacklist nova_core
blacklist nova_drm
